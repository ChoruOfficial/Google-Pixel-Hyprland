# PROJECT:  EXOCORE TERMINAL ULTRA-UNIQUE
# AUTHOR:   Choru Official (Johnsteve Costanos)
# ---------------------------------------------------------
shell fish
# --- Fonts (JetBrains Mono for the win) ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        9.0
disable_ligatures never

# --- Window Layout & Border ---
window_padding_width  15
window_margin_width   5
active_border_color   #4285F4
inactive_border_color #2d2d2d
window_border_width   1.5pt

# --- Glassmorphism Effect ---
background_opacity      0.70
background_blur         1
dynamic_background_opacity yes

# --- Google Pixel Color Palette ---
background #101010
foreground #f8f8f2
cursor     #4285F4
cursor_shape beam
cursor_beam_thickness 2

# Selection Colors
selection_foreground #ffffff
selection_background #4285f4

# --- The 16 Colors (Exocore Glow Edition) ---
# Black
color0  #1e1e1e
color8  #444444
# Red (Google Red)
color1  #ea4335
color9  #ff6b6b
# Green (Google Green)
color2  #34a853
color10 #50fa7b
# Yellow (Google Yellow)
color3  #fbbc05
color11 #f1fa8c
# Blue (Google Blue)
color4  #4285f4
color12 #8be9fd
# Magenta
color5  #9b51e0
color13 #ff79c6
# Cyan
color6  #24b1eb
color14 #8be9fd
# White
color7  #f1f3f4
color15 #ffffff

# --- Tab Bar Aesthetics ---
tab_bar_edge            top
tab_bar_style           fade
tab_fade                0.25 0.5 0.75 1
active_tab_foreground   #ffffff
active_tab_background   #4285f4
active_tab_font_style   bold
inactive_tab_foreground #757575
inactive_tab_background #101010

# --- Advanced Tweaks ---
repaint_delay    10
input_delay      3
sync_to_monitor  yes
shell_integration enabled
