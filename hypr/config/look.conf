general {
    gaps_in = 4
    gaps_out = 8
    border_size = 0

    col.active_border = rgba(00000000)
    col.inactive_border = rgba(00000000)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes

    animation = windows, 1, 4, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}
